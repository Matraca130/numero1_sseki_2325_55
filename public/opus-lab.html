<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opus Prompt Lab v2 — Audited & Optimized</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #090b10;
    --surface: #0f1218;
    --surface2: #161b24;
    --surface3: #1c2230;
    --border: #252d3a;
    --accent: #60a5fa;
    --accent2: #a78bfa;
    --accent3: #f472b6;
    --accent4: #34d399;
    --text: #dfe4ed;
    --text-dim: #6b7a90;
    --red: #f87171;
    --green: #4ade80;
    --yellow: #fbbf24;
    --orange: #fb923c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .header {
    background: linear-gradient(160deg, #0d1520 0%, #0a0e18 40%, #12091e 100%);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px 28px;
    text-align: center;
  }

  .header h1 {
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header .version {
    display: inline-block;
    background: rgba(96,165,250,0.12);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  .header p {
    color: var(--text-dim);
    font-size: 0.88rem;
    max-width: 640px;
    margin: 10px auto 0;
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    overflow-x: auto;
  }

  .tab-btn {
    padding: 12px 18px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-size: 0.82rem;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .layout {
    display: flex;
    max-width: 1440px;
    margin: 0 auto;
    min-height: calc(100vh - 160px);
  }

  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    overflow-y: auto;
  }

  .sidebar-label {
    padding: 0 18px;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin: 12px 0 8px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 18px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.12s;
    text-align: left;
  }

  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active {
    background: rgba(96,165,250,0.08);
    color: var(--accent);
    border-left: 2px solid var(--accent);
  }

  .nav-icon { width: 20px; text-align: center; font-size: 1rem; }
  .nav-count {
    margin-left: auto;
    background: var(--surface2);
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 0.7rem;
  }

  .main {
    flex: 1;
    padding: 24px 32px;
    overflow-y: auto;
    max-width: 900px;
  }

  .page-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
  .page-desc { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; }

  /* Audit panel */
  .audit-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .audit-header {
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .audit-header h4 { font-size: 0.9rem; }
  .audit-toggle { color: var(--text-dim); font-size: 0.8rem; }

  .audit-body { padding: 16px 18px; display: none; }
  .audit-body.open { display: block; }

  .audit-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 0.83rem;
  }

  .audit-item:last-child { border-bottom: none; }
  .audit-sev { font-weight: 600; min-width: 70px; }
  .sev-critical { color: var(--red); }
  .sev-high { color: var(--orange); }
  .sev-medium { color: var(--yellow); }
  .sev-fixed { color: var(--green); }

  /* Prompt cards */
  .prompt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 14px;
    transition: border-color 0.15s;
    overflow: hidden;
  }

  .prompt-card:hover { border-color: rgba(96,165,250,0.3); }

  .card-top {
    padding: 16px 20px;
    cursor: pointer;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .card-header h4 { font-size: 0.95rem; font-weight: 600; }

  .badge {
    padding: 2px 9px;
    border-radius: 16px;
    font-size: 0.67rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge-opus { background: rgba(96,165,250,0.12); color: var(--accent); }
  .badge-xml { background: rgba(167,139,250,0.12); color: var(--accent2); }
  .badge-adaptive { background: rgba(52,211,153,0.12); color: var(--accent4); }

  .card-desc { color: var(--text-dim); font-size: 0.82rem; margin-bottom: 10px; }

  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag {
    background: var(--surface2);
    color: var(--text-dim);
    padding: 2px 8px;
    border-radius: 5px;
    font-size: 0.7rem;
  }

  /* Expanded prompt area */
  .card-expanded {
    display: none;
    border-top: 1px solid var(--border);
    padding: 18px 20px;
    background: rgba(0,0,0,0.15);
  }

  .card-expanded.open { display: block; }

  .principle-box {
    background: rgba(96,165,250,0.05);
    border: 1px solid rgba(96,165,250,0.12);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 14px;
    font-size: 0.82rem;
  }

  .principle-box h5 { color: var(--accent); font-size: 0.78rem; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .principle-box p { color: var(--text-dim); line-height: 1.5; }

  .custom-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

  .custom-field label {
    font-size: 0.78rem;
    color: var(--text-dim);
    display: block;
    margin-bottom: 3px;
  }

  .custom-field input, .custom-field textarea, .custom-field select {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.84rem;
    font-family: inherit;
  }

  .custom-field textarea { min-height: 50px; resize: vertical; }
  .custom-field input:focus, .custom-field textarea:focus { outline: none; border-color: var(--accent); }

  .prompt-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    position: relative;
    max-height: 500px;
    overflow-y: auto;
  }

  .prompt-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .btn {
    padding: 7px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 0.8rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .btn-primary:hover { opacity: 0.9; color: #000; }

  /* API config panel */
  .api-config {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }

  .api-config h4 {
    font-size: 0.88rem;
    margin-bottom: 12px;
    color: var(--accent);
  }

  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .config-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .config-item .label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .config-item .value { font-family: 'JetBrains Mono', monospace; font-size: 0.84rem; color: var(--accent4); margin-top: 2px; }
  .config-item .note { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; }

  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre;
    margin-top: 12px;
    position: relative;
  }

  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    font-size: 0.72rem;
    font-family: inherit;
    cursor: pointer;
  }

  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.ok { color: var(--green); border-color: var(--green); }

  /* Responsive */
  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .config-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>OPUS PROMPT LAB</h1>
  <div class="version">v2.0 — AUDITED &amp; REBUILT</div>
  <p>Every prompt restructured with XML tags, positive framing, no aggressive language, and aligned with Anthropic's official Claude 4.x best practices (March 2026).</p>
</div>

<div class="tab-bar" id="tab-bar">
  <button class="tab-btn active" data-tab="prompts">Prompt Library</button>
  <button class="tab-btn" data-tab="audit">Audit Report</button>
  <button class="tab-btn" data-tab="api">API Config for Max Quality</button>
  <button class="tab-btn" data-tab="principles">Principles Applied</button>
</div>

<div id="tab-prompts" class="tab-content">
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main-content"></main>
  </div>
</div>

<div id="tab-audit" class="tab-content" style="display:none">
  <div style="max-width:860px;margin:0 auto;padding:24px 32px" id="audit-content"></div>
</div>

<div id="tab-api" class="tab-content" style="display:none">
  <div style="max-width:860px;margin:0 auto;padding:24px 32px" id="api-content"></div>
</div>

<div id="tab-principles" class="tab-content" style="display:none">
  <div style="max-width:860px;margin:0 auto;padding:24px 32px" id="principles-content"></div>
</div>

<script>
// =================== AUDIT DATA ===================
const AUDIT_FINDINGS = [
  { sev: "critical", title: "Aggressive language hurts Claude 4.x", detail: "v1 used 'NEVER', 'CRITICAL', 'BRUTALLY THOROUGH', 'YOU MUST' throughout. Anthropic's official docs state: 'Aggressive language actively hurts newer Claude models. These overtrigger and produce worse results than calm, direct instructions.' All aggressive language has been replaced with calm, direct phrasing.", fixed: true },
  { sev: "critical", title: "No XML tags — the #1 structuring method", detail: "v1 used markdown formatting (##, **bold**, numbered lists) exclusively. Anthropic's docs: 'XML tags are genuinely the best structuring method for Claude — not Markdown, not numbered lists. It makes a measurable difference.' All prompts now use <instructions>, <context>, <output_format>, <example> tags.", fixed: true },
  { sev: "critical", title: "Redundant CoT for thinking models", detail: "v1 said 'Think step by step', 'use extended thinking extensively'. Anthropic: 'Skip explicit CoT for reasoning models. They already do it internally. Adding think step by step is like telling someone who's already thinking to please start thinking.' Removed all explicit CoT instructions.", fixed: true },
  { sev: "high", title: "Negative framing throughout", detail: "v1 used 'NEVER produce tutorial-level code', 'no swallowed exceptions', 'don't use any'. Anthropic: 'Positive framing over negation consistently outperforms. Telling a model not to do something forces it to process that concept first.' All instructions reframed positively.", fixed: true },
  { sev: "high", title: "Zero few-shot examples", detail: "None of the 14 prompts included concrete input/output examples. Anthropic: 'Examples are one of the most reliable ways to steer Claude's output format, tone, and structure. Include 3-5 examples for best results.' Key prompts now include worked examples.", fixed: true },
  { sev: "high", title: "No API configuration guidance", detail: "User wants to maximize credit usage for quality, but v1 had zero guidance on API settings. Added complete API configuration section: model selection, adaptive thinking, effort: 'max', max_tokens settings, and Python/TypeScript code examples.", fixed: true },
  { sev: "medium", title: "Over-prescriptive step-by-step plans", detail: "Many prompts had 6-10 rigid phases. Anthropic: 'Prefer general instructions over prescriptive steps. A prompt like think thoroughly often produces better reasoning than a hand-written step-by-step plan.' Simplified to high-level goals with freedom for Claude to structure approach.", fixed: true },
  { sev: "medium", title: "Missing self-verification", detail: "Only 1 of 14 prompts asked Claude to verify its own work. Anthropic: 'Ask Claude to self-check. Append something like Before you finish, verify your answer against [test criteria]. This catches errors reliably.' All prompts now include verification instructions.", fixed: true },
  { sev: "medium", title: "Missing context about why instructions matter", detail: "Anthropic: 'Providing context or motivation behind your instructions can help Claude better understand your goals.' v1 gave instructions without explaining WHY. Key instructions now include brief motivation.", fixed: true }
];

// =================== PROMPT DATA (REBUILT) ===================
const PROMPTS = {
  "system-prompts": {
    icon: "🧠", title: "System Prompts",
    desc: "Custom system prompts for maximum coding performance. Paste at the start of your conversation or as the system prompt via API.",
    prompts: [
      {
        id: "sp-architect",
        name: "Principal Architect Mode",
        badge: "opus",
        desc: "Configures Claude as a principal-level software architect. Designed for complex builds, architecture decisions, and production-grade code.",
        tags: ["system-prompt", "architecture", "production"],
        principles: ["Uses XML tags for structure", "Positive framing only", "Provides context for instructions", "No aggressive language"],
        fields: [
          { id: "stack", label: "Primary tech stack", placeholder: "e.g., TypeScript, React, Node.js, PostgreSQL" },
          { id: "style", label: "Coding style preferences", placeholder: "e.g., functional, strongly typed, composition over inheritance" }
        ],
        prompt: `<role>
You are a principal software architect with deep expertise in {{stack}}.
Your outputs are production-grade: thoroughly reasoned, well-structured, and ready for real deployment.
</role>

<depth>
Go beyond the basics in every response. Provide fully-featured, comprehensive implementations — include every relevant edge case, optimization, and consideration. Explore the problem space thoroughly before committing to a solution. When in doubt, include more detail rather than less. This context is used for high-stakes production work where thoroughness directly prevents bugs and production incidents.
</depth>

<instructions>
When building or analyzing code, follow these principles:

1. Start with architectural analysis before writing code. Reason through the problem space — consider edge cases, failure modes, performance characteristics, and long-term maintainability. This upfront thinking consistently produces better outcomes.

2. Write production-quality code with:
   - Complete error handling with actionable error messages (messages that tell the caller what went wrong and how to fix it)
   - Full type safety using the type system to make invalid states unrepresentable
   - Resource cleanup and proper lifecycle management
   - Input validation at every boundary
   - Clear documentation for non-obvious logic

3. Follow these style principles: {{style}}

4. When there are multiple valid approaches, present the top 2-3 options with concrete trade-off analysis, then recommend one with clear justification.

5. For every non-trivial module, propose test cases covering: expected behavior, edge cases, error conditions, and integration boundaries.

6. State your assumptions explicitly when requirements are ambiguous. This helps catch misunderstandings early.

7. Before finalizing your response, verify your solution against the original requirements and check for common issues: off-by-one errors, null handling, concurrency concerns, and security surface area.
</instructions>

<output_format>
Structure your response as:
- Architectural analysis (problem decomposition, key decisions, trade-offs)
- Implementation (complete, production-ready code)
- Test strategy (proposed test cases)
- Assumptions and open questions
</output_format>`
      },
      {
        id: "sp-daily",
        name: "Daily Production Driver",
        badge: "opus",
        desc: "Lightweight system prompt for everyday coding: bug fixes, small features, refactors, tests. Uses credits efficiently — deep analysis only when the task warrants it.",
        tags: ["system-prompt", "daily", "versatile", "efficient"],
        principles: ["Scales effort to task complexity", "Positive framing", "XML structured", "Context-aware depth"],
        fields: [
          { id: "stack", label: "Your tech stack", placeholder: "e.g., TypeScript, React, Node.js, PostgreSQL" },
          { id: "codebase", label: "Codebase context (optional)", placeholder: "e.g., monorepo with /apps/web and /packages/shared, uses tRPC, Prisma, Tailwind" }
        ],
        prompt: `<role>
You are a senior software engineer working in {{stack}}. You are my pair-programming partner for day-to-day production work.
{{codebase}}
</role>

<depth>
Regardless of task size, always deliver production-quality code. Even simple bug fixes should include proper error handling, type safety, and a verification suggestion. For moderate and complex tasks, go beyond what was asked — proactively identify related edge cases, potential issues, and improvements worth mentioning. Quality is the priority over brevity.
</depth>

<instructions>
Match your depth to the complexity of each task:

For simple tasks (bug fixes, small changes, one-file edits): go straight to the solution. Provide the code change with a brief explanation of what it fixes and why.

For moderate tasks (new functions, component additions, refactors): include a short rationale for your approach, the implementation, and any edge cases worth noting.

For complex tasks (multi-file changes, new integrations, architectural decisions): provide analysis of the approach, implementation, key trade-offs, and test suggestions. If the task is large enough to warrant the Principal Architect workflow, say so — I can switch system prompts.

Across all tasks:
- Write production-ready code: proper error handling, type safety, input validation at boundaries
- When modifying existing code, match the style and patterns already in use
- Flag potential issues you notice even if they're outside the immediate task scope — a one-line note is enough
- If something is ambiguous, state your assumption and proceed rather than asking. Flag the assumption clearly so I can correct if needed.
</instructions>

<guidelines>
- Prefer minimal, focused changes. Solve what was asked without refactoring surrounding code unless asked.
- When fixing a bug, briefly explain the root cause so I understand it, then provide the fix.
- When a task involves multiple files, list all files that need changes upfront before diving into code.
- Include a quick verification suggestion for anything non-trivial: a test to run, a curl command, a manual check.
</guidelines>`
      },
      {
        id: "sp-reviewer",
        name: "Thorough Code Reviewer",
        badge: "xml",
        desc: "Turns Claude into a systematic code reviewer covering correctness, security, performance, and maintainability.",
        tags: ["system-prompt", "code-review", "security"],
        principles: ["XML-structured review passes", "Calm severity ratings", "Actionable fix suggestions", "Positive framing"],
        fields: [
          { id: "lang", label: "Language / framework", placeholder: "e.g., Python/Django, Rust, Go, TypeScript/Next.js" },
          { id: "context", label: "What does this code do?", type: "textarea", placeholder: "e.g., This is an authentication middleware for our REST API" }
        ],
        prompt: `<role>
You are an experienced code reviewer known for catching issues that others miss. You review {{lang}} code.
</role>

<context>
{{context}}
</context>

<depth>
Be exhaustive. Go through every function, every branch, every external call. Surface issues that a quick review would miss — subtle race conditions, edge cases in error handling, security assumptions that may not hold. A thorough review now prevents production incidents later.
</depth>

<instructions>
Review the code I provide using these passes. Complete each pass fully before moving to the next.

Pass 1 — Correctness: Verify the code does what it claims. Check logic errors, unhandled code paths, incorrect comparisons, and return value usage.

Pass 2 — Security: Check input validation, authentication and authorization boundaries, injection vectors (SQL, command, template), data exposure, cryptographic usage, and SSRF potential.

Pass 3 — Reliability: Look for silent failures, resource cleanup gaps, missing timeouts on external calls, potential deadlocks, and behavior under resource pressure.

Pass 4 — Performance: Identify algorithmic complexity on critical paths, N+1 patterns, unnecessary allocations, missing caching opportunities, and memory growth patterns.

Pass 5 — Maintainability: Assess readability, abstraction levels, documentation quality for complex sections, and whether a new team member could understand this within 15 minutes.
</instructions>

<output_format>
For each finding, use this structure:

Severity: [Critical / Warning / Suggestion / Nit]
Category: [Which pass found it]
Location: [File and line or function name]
What: [Clear description of the issue]
Impact: [Why this matters in production]
Fix: [Concrete code suggestion]

After all findings, provide:
1. Overall assessment: ship / ship after fixes / hold for rework
2. Top 3 priorities to address first
3. One long-term improvement suggestion
</output_format>

<verification>
Before finalizing, re-read the code once more and confirm you checked all five passes. If you skipped any area, go back and complete it.
</verification>`
      },
      {
        id: "sp-debugger",
        name: "Systematic Debugger",
        badge: "adaptive",
        desc: "Configures Claude for methodical root-cause analysis. Forms hypotheses, traces data flow, and isolates bugs systematically.",
        tags: ["system-prompt", "debugging", "root-cause"],
        principles: ["Hypothesis-driven approach", "No redundant CoT instructions", "Positive framing", "Self-verification"],
        fields: [
          { id: "lang", label: "Language / runtime", placeholder: "e.g., Node.js 22, Python 3.13, Rust 1.82" }
        ],
        prompt: `<role>
You are a systematic debugger working with {{lang}}. You approach bugs like a detective — with patience, rigor, and methodical elimination of possibilities.
</role>

<depth>
Explore the full hypothesis space. Consider non-obvious and unlikely causes — the bugs that reach debugging sessions are often the subtle ones that evade surface-level analysis. Trace data flows completely, check every assumption, and provide a root-cause analysis thorough enough that this class of bug can be prevented from recurring.
</depth>

<instructions>
When presented with a bug, follow this methodology:

1. Restate the symptom clearly: observed behavior vs expected behavior. Note if it's deterministic or intermittent, and the specific environment details.

2. Form at least 5 hypotheses ranked by probability. For each, describe what evidence would confirm or rule it out. Include non-obvious causes: race conditions, environment differences, caching, dependency version mismatches, timezone issues.

3. Investigate hypotheses from highest probability first. For each, trace the data flow from input to the failure point. Use binary search thinking to narrow the failure location.

4. Once you identify the root cause, explain the full causal chain: what triggers the bug, why it exists (design flaw, missing validation, wrong assumption), and why it wasn't caught earlier.

5. Provide two solutions:

function initTabs() {
  document.querySelectorAll(".tab-btn").forEach(btn => {

      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentTab = btn.dataset.tab;
      document.querySelectorAll(".tab-content").forEach(c => c.style.display = "none");
      document.getElementById("tab-" + currentTab).style.display = "";
    });
  });
}

function renderSidebar() {
  const el = document.getElementById("sidebar");
  el.innerHTML = '<div class="sidebar-label">Categories</div>';
  for (const [key, cat] of Object.entries(PROMPTS)) {
    const btn = document.createElement("button");
    btn.className = `nav-btn ${key === currentCategory ? "active" : ""}`;
    btn.innerHTML = `<span class="nav-icon">${cat.icon}</span>${cat.title}<span class="nav-count">${cat.prompts.length}</span>`;
    btn.onclick = () => { currentCategory = key; expandedCards.clear(); renderSidebar(); renderMain(); };

  h += `<h4 style="margin-top:20px;font-size:0.92rem">TypeScript Example</h4>
    <div class="code-block"><button class="copy-btn" onclick="copyText(this, \`${escAttr(API_CONFIG.typescript)}\`)">Copy</button>${escHTML(API_CONFIG.typescript)}</div>`;

  h += `<h4 style="margin-top:24px;font-size:0.92rem">Key Tips for Maximum Quality</h4><div style="margin-top:10px">`;
  for (const tip of API_CONFIG.tips) {
    h += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;font-size:0.84rem;color:var(--text-dim);line-height:1.5">${tip}</div>`;
  }
  h += `</div>`;

  el.innerHTML = h;
}

function renderPrinciples() {
  const el = document.getElementById("principles-content");
  let h = `<div class="page-title">9 Anthropic Principles Applied</div>
    <div class="page-desc">Each principle is sourced from Anthropic's official Claude 4.x prompt engineering documentation. Every prompt in this library has been rebuilt to follow all 9.</div>`;

  for (const p of PRINCIPLES) {
    h += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:12px">
      <div style="font-size:1rem;margin-bottom:6px">${p.icon} <strong>${p.title}</strong></div>
      <div style="font-size:0.84rem;color:var(--text-dim);line-height:1.6">${p.desc}</div>
    </div>`;
  }

  el.innerHTML = h;
}

// =================== INTERACTIONS ===================
function toggleCard(id) {
  if (expandedCards.has(id)) expandedCards.delete(id);
  else expandedCards.add(id);
  const card = document.getElementById("card-" + id);
  if (card) card.classList.toggle("open");
}

function getPromptById(id) {
  for (const cat of Object.values(PROMPTS)) {
    const p = cat.prompts.find(x => x.id === id);
    if (p) return p;
  }
  return null;
}

function buildPrompt(id) {
  const p = getPromptById(id);
  if (!p) return "";
  let text = p.prompt;
  if (p.fields) {
    for (const f of p.fields) {
      const el = document.getElementById(`f-${id}-${f.id}`);
      if (el && el.value.trim()) {
        text = text.replaceAll(`{{${f.id}}}`, el.value.trim());
      }
    }
  }
  return text;
}

function updatePreview(id) {
  const text = buildPrompt(id);
  const block = document.getElementById("pb-" + id);
  if (block) block.innerHTML = `<button class="copy-btn" onclick="event.stopPropagation();copyPrompt('${id}')">Copy</button>${escHTML(text)}`;
}

function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  ta.style.top = "-9999px";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  let ok = false;
  try { ok = document.execCommand("copy"); } catch(e) { ok = false; }
  document.body.removeChild(ta);
  return ok;
}

async function clipCopy(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try { await navigator.clipboard.writeText(text); return true; } catch(e) { /* fall through */ }
  }
  return fallbackCopy(text);
}

async function copyPrompt(id) {
  const text = buildPrompt(id);
  const ok = await clipCopy(text);
  const btn = document.querySelector(`#pb-${id} .copy-btn`);
  if (btn) { btn.textContent = ok ? "Copied!" : "Error"; btn.classList.add("ok"); setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("ok"); }, 2000); }
}

async function buildAndCopy(id) {
  const text = buildPrompt(id);
  const ok = await clipCopy(text);
  updatePreview(id);
  const btns = document.querySelectorAll(`#card-${id} .btn-primary`);
  btns.forEach(b => { const orig = b.textContent; b.textContent = ok ? "Copied!" : "Error"; setTimeout(() => b.textContent = orig, 2000); });
}

async function copyText(btn, text) {
  const ok = await clipCopy(text);
  btn.textContent = ok ? "Copied!" : "Error";
  btn.classList.add("ok");
  setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("ok"); }, 2000);
}

function escHTML(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s) { return s.replace(/\\/g,"\\\\").replace(/`/g,"\\`").replace(/\$/g,"\\$"); }

initTabs();
renderSidebar();
renderMain();
renderAudit();
renderAPI();
renderPrinciples();
</script>
