name: Code Quality Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Quality Auditor
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude"
          prompt: |
            You are the code-quality-auditor. Audit the changes in PR #${{ github.event.pull_request.number }} ("${{ github.event.pull_request.title }}").

            Steps:

            1. Get the list of changed files and their diffs:
               `gh pr diff ${{ github.event.pull_request.number }} --name-only`
               `gh pr diff ${{ github.event.pull_request.number }}`

            2. For each changed file (skip lockfiles, generated code, pure docs, test fixtures), read it and evaluate against these rules. Severity per rule:

               - **Cyclomatic complexity**: HIGH if >20, MEDIUM 11-20, LOW 8-10
               - **Deep nesting**: HIGH if >6 levels, MEDIUM 5-6, LOW 4
               - **Long methods**: HIGH if >100 lines, MEDIUM 51-100, LOW 40-50
               - **God classes/modules**: HIGH if >1000 lines, MEDIUM 501-1000, LOW 400-500
               - **Too many parameters**: MEDIUM 6-8, LOW 5
               - **O(n²) or worse in hot paths**: HIGH, MEDIUM if occasional, LOW if n<100
               - **N+1 query patterns**: CRITICAL in API endpoints, HIGH frequent, MEDIUM admin-only
               - **Magic numbers/strings in business logic**: HIGH, MEDIUM if duplicated 3+ times, LOW in logging
               - **Method signature quality**: MEDIUM for boolean-flag params / unclear return types, LOW for too many optional params or inconsistent verbs
               - **Side-effect cascade depth**: HIGH if >=4, MEDIUM if =3

            3. Downgrade (or skip) findings when context justifies them:
               - Switch/enum dispatch → not complexity
               - Orchestrators / coordinators → not god classes / not cascade depth
               - Config, schema, migration, generated, barrel files → skip
               - HTTP status codes, math constants (0/1/-1), test data → skip
               - Framework-required signatures (middleware, hooks) → skip

            4. Post a single PR comment using:
               `gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/audit-report.md`

               The comment must include:
               - Header: `## 🔍 Code Quality Audit` + compliance score X/10
               - Severity breakdown line: `**Summary:** C:N · H:N · M:N · L:N`
               - Top findings (max 15), newest/most-severe first, each with:
                 `- **[SEVERITY]** \`path/to/file.ts:LN\` — <rule> — <one-line recommendation>`
               - If no issues: `✅ No code quality issues detected in the changed files.`
               - Footer: `_Generated by code-quality-auditor workflow._`

            5. Do NOT modify any code. Report only.

          claude_args: "--model claude-opus-4-7 --allowedTools Bash(gh:*),Bash(cat:*),Bash(wc:*),Read,Grep,Glob"
        env:
          GH_TOKEN: ${{ github.token }}
