# Axon v4.4 — Comprehensive Test Gate
# Runs ALL tests on push/PR. Blocks deploy if any test fails.
name: Test Gate
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/server/**'
      - 'tests/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - '.github/workflows/test-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/functions/server/**'
      - 'tests/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - '.github/workflows/test-gate.yml'
  workflow_dispatch:
permissions:
  contents: read
  checks: write
jobs:
  unit-tests:
    name: Unit Tests (no network)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.x
      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('**/deno.lock', '**/deno.json') }}
          restore-keys: deno-${{ runner.os }}-
      - name: Run all unit tests
        run: |
          if [ -d "supabase/functions/server" ]; then
            deno test tests/unit/ --no-check
          else
            echo "::warning::supabase/functions/server not found — skipping unit tests"
          fi
  integration-tests:
    name: Integration Tests (live backend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests
    env:
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      TEST_INSTITUTION_ID: ${{ secrets.TEST_INSTITUTION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.x
      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('**/deno.lock', '**/deno.json') }}
          restore-keys: deno-${{ runner.os }}-
      - name: Check secrets
        run: |
          if [ -z "$TEST_SUPABASE_URL" ]; then
            echo "::warning::Secrets not set — skipping"
            echo "SKIP=true" >> $GITHUB_ENV
          fi
      - name: Run integration tests
        if: env.SKIP != 'true'
        run: deno test tests/integration/ --allow-net --allow-env --no-check
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    # Suite now runs 200+ test files (~5-10m wall-clock on shared runners).
    # Previous caps (5m then 10m) both tripped. 20m keeps ample headroom while
    # still catching a genuine hang.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-
      - name: Install dependencies
        run: npm install --no-audit
      - name: Run frontend tests
        run: npm test
  gate:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, frontend-tests]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "::error::Unit tests failed!" && exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" == "failure" ]; then
            echo "::error::Integration tests failed!" && exit 1
          fi
          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "::error::Frontend tests failed!" && exit 1
          fi
          echo "All tests passed."
