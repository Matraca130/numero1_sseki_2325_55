# Axon — Test Sessions
# Runs frontend + backend test suites and build validation.
name: Test Sessions

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  # ── Session 1: Frontend Tests (Vitest) ─────────────────────
  frontend-tests:
    name: "Session 1: Frontend Tests (Vitest)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest tests
        run: npm test

  # ── Session 2: Build Validation ────────────────────────────
  build-validation:
    name: "Session 2: Build Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Verify dist output exists
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::dist/ directory not found after build"
            exit 1
          fi
          echo "Build output size:"
          du -sh dist/

  # ── Session 3: Backend Unit Tests (Deno) ───────────────────
  backend-unit-tests:
    name: "Session 3: Backend Unit Tests (Deno)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('**/deno.lock', '**/deno.json') }}
          restore-keys: deno-${{ runner.os }}-

      - name: Run unit tests
        run: |
          if [ -d "tests/unit" ]; then
            deno test tests/unit/ --no-check
          else
            echo "::warning::tests/unit/ not found — skipping"
          fi

  # ── Session 4: Backend Integration Tests (Deno) ────────────
  backend-integration-tests:
    name: "Session 4: Backend Integration Tests (Deno)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-unit-tests
    env:
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      TEST_INSTITUTION_ID: ${{ secrets.TEST_INSTITUTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('**/deno.lock', '**/deno.json') }}
          restore-keys: deno-${{ runner.os }}-

      - name: Check secrets
        run: |
          if [ -z "$TEST_SUPABASE_URL" ]; then
            echo "::warning::Secrets not configured — skipping integration tests"
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Run integration tests
        if: env.SKIP != 'true'
        run: deno test tests/integration/ --allow-net --allow-env --no-check

  # ── Gate: All Sessions Must Pass ───────────────────────────
  all-sessions-passed:
    name: "All Test Sessions Passed"
    runs-on: ubuntu-latest
    needs: [frontend-tests, build-validation, backend-unit-tests, backend-integration-tests]
    if: always()
    steps:
      - name: Check session results
        run: |
          echo "Frontend Tests:       ${{ needs.frontend-tests.result }}"
          echo "Build Validation:     ${{ needs.build-validation.result }}"
          echo "Backend Unit:         ${{ needs.backend-unit-tests.result }}"
          echo "Backend Integration:  ${{ needs.backend-integration-tests.result }}"

          failed=false

          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "::error::Session 1 (Frontend Tests) failed!"
            failed=true
          fi

          if [ "${{ needs.build-validation.result }}" != "success" ]; then
            echo "::error::Session 2 (Build Validation) failed!"
            failed=true
          fi

          if [ "${{ needs.backend-unit-tests.result }}" != "success" ]; then
            echo "::error::Session 3 (Backend Unit Tests) failed!"
            failed=true
          fi

          if [ "${{ needs.backend-integration-tests.result }}" == "failure" ]; then
            echo "::error::Session 4 (Backend Integration Tests) failed!"
            failed=true
          fi

          if [ "$failed" = "true" ]; then
            exit 1
          fi

          echo "All test sessions passed successfully!"
